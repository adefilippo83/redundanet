version: 2
updates:
  # Python dependencies (Poetry — Dependabot reads pyproject.toml + poetry.lock).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Bundle low-risk dev/tooling bumps into one PR to cut noise.
      dev-dependencies:
        dependency-type: development
    labels:
      - dependencies
      - python

  # GitHub Actions versions used across the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
