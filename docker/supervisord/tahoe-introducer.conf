[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
user=root

[program:tahoe-introducer]
command=/bin/bash -c "python /app/entrypoint.py && exec tahoe run /var/lib/tahoe-introducer"
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:furl-publish]
command=/bin/bash -c "while [ ! -s /var/lib/tahoe-introducer/private/introducer.furl ]; do sleep 2; done; install -d /var/lib/redundanet/manifest; cp /var/lib/tahoe-introducer/private/introducer.furl /var/lib/redundanet/manifest/introducer.furl; echo \"Published introducer FURL: $(cat /var/lib/redundanet/manifest/introducer.furl)\"; sleep infinity"
autostart=true
autorestart=true
startsecs=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
