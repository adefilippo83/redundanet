# RedundaNet Docker Compose Configuration
# Distributed encrypted storage on a mesh VPN network
#
# By default this pulls prebuilt multi-arch images from the GitHub Container
# Registry (no local build). The image owner and tag are overridable:
#   REGISTRY_OWNER  registry namespace (default: adefilippo83)
#   VERSION         image tag         (default: latest)
# To build the images from source instead of pulling, overlay the build file:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build

services:
  tinc:
    image: ghcr.io/${REGISTRY_OWNER:-adefilippo83}/redundanet-tinc:${VERSION:-latest}
    container_name: redundanet-tinc
    hostname: ${NODE_NAME:-redundanet-node}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - redundanet
    ports:
      - "${TINC_PORT:-655}:655/tcp"
      - "${TINC_PORT:-655}:655/udp"
    environment:
      - REDUNDANET_NODE_NAME=${NODE_NAME}
      - REDUNDANET_INTERNAL_VPN_IP=${VPN_IP}
      - REDUNDANET_PUBLIC_IP=${PUBLIC_IP:-auto}
      - REDUNDANET_GPG_KEY_ID=${GPG_KEY_ID}
      - REDUNDANET_MANIFEST_REPO=${MANIFEST_REPO}
      - REDUNDANET_MANIFEST_BRANCH=${MANIFEST_BRANCH:-main}
      - REDUNDANET_DEBUG=${DEBUG:-false}
      - REDUNDANET_LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - tinc-config:/etc/tinc/redundanet
      - manifest:/var/lib/redundanet/manifest
      - logs:/var/log/redundanet
      - ${GPG_KEY_FILE:-./secrets/gpg_private_key.asc}:/run/secrets/gpg_private_key:ro
    healthcheck:
      test: ["CMD", "ip", "link", "show", "redundanet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  tahoe-introducer:
    image: ghcr.io/${REGISTRY_OWNER:-adefilippo83}/redundanet-tahoe-introducer:${VERSION:-latest}
    container_name: redundanet-tahoe-introducer
    restart: unless-stopped
    depends_on:
      tinc:
        condition: service_healthy
    network_mode: "service:tinc"
    environment:
      - REDUNDANET_NODE_NAME=${NODE_NAME}
      - REDUNDANET_INTERNAL_VPN_IP=${VPN_IP}
      - REDUNDANET_LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - tahoe-introducer:/var/lib/tahoe-introducer
      - manifest:/var/lib/redundanet/manifest
      - logs:/var/log/redundanet
    profiles:
      - introducer

  tahoe-storage:
    image: ghcr.io/${REGISTRY_OWNER:-adefilippo83}/redundanet-tahoe-storage:${VERSION:-latest}
    container_name: redundanet-tahoe-storage
    restart: unless-stopped
    depends_on:
      tinc:
        condition: service_healthy
    network_mode: "service:tinc"
    environment:
      - REDUNDANET_NODE_NAME=${NODE_NAME}
      - REDUNDANET_INTERNAL_VPN_IP=${VPN_IP}
      - REDUNDANET_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDUNDANET_RESERVED_SPACE=${RESERVED_SPACE:-1G}
      - REDUNDANET_SHARES_NEEDED=${SHARES_NEEDED:-3}
      - REDUNDANET_SHARES_HAPPY=${SHARES_HAPPY:-7}
      - REDUNDANET_SHARES_TOTAL=${SHARES_TOTAL:-10}
    volumes:
      - tahoe-storage:/var/lib/tahoe-storage
      - storage-data:/data/storage
      - manifest:/var/lib/redundanet/manifest
      - logs:/var/log/redundanet
    profiles:
      - storage

  tahoe-client:
    image: ghcr.io/${REGISTRY_OWNER:-adefilippo83}/redundanet-tahoe-client:${VERSION:-latest}
    container_name: redundanet-tahoe-client
    restart: unless-stopped
    depends_on:
      tinc:
        condition: service_healthy
    network_mode: "service:tinc"
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - REDUNDANET_NODE_NAME=${NODE_NAME}
      - REDUNDANET_INTERNAL_VPN_IP=${VPN_IP}
      - REDUNDANET_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDUNDANET_SHARES_NEEDED=${SHARES_NEEDED:-3}
      - REDUNDANET_SHARES_HAPPY=${SHARES_HAPPY:-7}
      - REDUNDANET_SHARES_TOTAL=${SHARES_TOTAL:-10}
    volumes:
      - tahoe-client:/var/lib/tahoe-client
      - manifest:/var/lib/redundanet/manifest
      - logs:/var/log/redundanet
      - ${MOUNT_POINT:-./mount}:/mnt/redundanet:shared
    profiles:
      - client

networks:
  redundanet:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  tinc-config:
  manifest:
  logs:
  tahoe-introducer:
  tahoe-storage:
  tahoe-client:
  storage-data:
